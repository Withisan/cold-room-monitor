<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Room Monitoring System v7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
            --blue: #58a6ff; --green: #3fb950; --red: #f85149; --amber: #d29922;
            --purple: #bc8cff; --muted: #7d8590;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* Layout */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        /* Card Styling */
        .room-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; position: relative; transition: 0.3s; }
        .room-card.alarm { border-color: var(--red); box-shadow: 0 0 10px rgba(248, 81, 73, 0.2); }
        .room-card.warn { border-color: var(--amber); }
        
        .room-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .room-name { font-size: 1.2em; font-weight: bold; color: var(--blue); }
        .room-zone { font-size: 0.8em; color: var(--muted); }
        
        .metrics { display: flex; gap: 10px; margin-bottom: 10px; }
        .metric-box { flex: 1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; text-align: center; }
        .metric-label { font-size: 0.75em; color: var(--muted); margin-bottom: 4px; }
        .metric-value { font-size: 1.6em; font-weight: bold; }
        .metric-unit { font-size: 0.5em; margin-left: 2px; }
        
        /* Status Elements */
        .status-chip { font-size: 0.7em; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .chip-ok { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .chip-err { background: rgba(248, 81, 73, 0.15); color: var(--red); animation: blink 1s infinite; }
        .chip-off { background: var(--border); color: var(--muted); }
        
        .equip-badge { font-size: 0.75em; padding: 3px 6px; border-radius: 4px; background: #21262d; margin-right: 5px; }
        .comp-on { color: var(--green); border-left: 3px solid var(--green); }
        .defrost-on { color: var(--amber); border-left: 3px solid var(--amber); }
        
        /* Logs & Charts */
        .side-panel { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .log-container { background: var(--card); border: 1px solid var(--border); border-radius: 8px; height: 300px; display: flex; flex-direction: column; }
        .log-header { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .log-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85em; }
        .log-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-time { color: var(--muted); min-width: 65px; }
        
        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; height: 350px; }
        
        @keyframes blink { 50% { opacity: 0.6; } }
        .val-cold { color: #58a6ff; }
        .val-ok { color: var(--green); }
        .val-warn { color: var(--amber); }
        .val-err { color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2 id="roomCountLabel" style="margin:0;">Cold Room Dashboard</h2>
            <div style="font-size: 0.85em; color: var(--muted);">
                <span id="connDot" class="conn-dot"></span> <span id="connText">Connecting...</span>
                | <span id="clockDisplay">--:--:--</span>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="exportExcel()">Export Today</button>
            <button id="soundBtn" onclick="toggleSound()">🔔</button>
            <button onclick="openSettings()">⚙️ Settings</button>
        </div>
    </div>

    <div style="display:flex; gap:15px; margin-bottom:15px; font-size:0.9em;">
        <div style="color:var(--green)">Online: <span id="sumOk">0</span></div>
        <div style="color:var(--amber)">Warning: <span id="sumWarn">0</span></div>
        <div style="color:var(--red)">Alarm: <span id="sumAlarm">0</span></div>
        <div style="color:var(--muted)">Offline: <span id="sumOff">0</span></div>
    </div>

    <div class="grid" id="roomsGrid">
        </div>

    <div class="side-panel">
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>
        
        <div class="log-container">
            <div class="log-header">
                <strong>Event Logs</strong>
                <button onclick="clearLog()" style="padding:2px 8px; font-size:0.8em;">Clear</button>
            </div>
            <div class="log-list" id="logList">
                <div style="color:var(--muted); text-align:center; padding-top:20px;">รอข้อมูล...</div>
            </div>
        </div>
    </div>

    <div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:20px; border-radius:8px; width:90%; max-width:500px; border:1px solid var(--border);">
            <h3>Configuration</h3>
            <label>MQTT Broker:</label><br>
            <input type="text" id="brokerInput" style="width:100%; margin-bottom:10px;" value="broker.hivemq.com"><br>
            <label>Defrost Limit (Min):</label><br>
            <input type="number" id="defrostMaxMin" style="width:100%; margin-bottom:15px;" value="45"><br>
            <div style="text-align:right;">
                <button onclick="saveSettings()">Save & Close</button>
                <button onclick="closeSettings()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIG & STATE
        // ============================================================
        const DEFAULT_ROOMS = [
            { id: 'A', name: 'Room A', zone: 'Chill', target: 5, min: 2, max: 8, warnOffset: 1 },
            { id: 'B', name: 'Room B', zone: 'Freezer', target: -18, min: -22, max: -15, warnOffset: 2 }
        ];

        let ROOMS_CONFIG = JSON.parse(localStorage.getItem('roomsConfig')) || DEFAULT_ROOMS;
        let defrostMaxMs = (parseInt(localStorage.getItem('defrostMaxMin') || '45')) * 60000;
        const roomState = {};
        const defrostStart = {};
        let soundEnabled = true;

        // ============================================================
        // UI & RENDERING
        // ============================================================
        function buildCards() {
            const grid = document.getElementById('roomsGrid');
            grid.innerHTML = '';
            ROOMS_CONFIG.forEach(r => {
                const card = document.createElement('div');
                card.className = 'room-card'; card.id = `card-${r.id}`;
                card.innerHTML = `
                    <div class="room-header">
                        <div>
                            <div class="room-name">${r.name}</div>
                            <div class="room-zone">${r.zone} · Target ${r.target}°C</div>
                        </div>
                        <div class="status-chip chip-off" id="chip-${r.id}">Offline</div>
                    </div>
                    <div class="metrics">
                        <div class="metric-box">
                            <div class="metric-label">TEMP</div>
                            <div class="metric-value" id="temp-${r.id}">--</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">HUM</div>
                            <div class="metric-value" id="hum-${r.id}">--</div>
                        </div>
                    </div>
                    <div style="font-size:0.8em; margin-bottom:5px;">
                        Door: <span id="door-${r.id}">--</span>
                    </div>
                    <div class="equip-row">
                        <span class="equip-badge" id="comp-${r.id}">⚙️ Comp --</span>
                        <span class="equip-badge" id="defrost-${r.id}">❄️ Defrost --</span>
                    </div>
                `;
                grid.appendChild(card);
                roomState[r.id] = null;
            });
        }

        function updateCard(id, data) {
            const cfg = ROOMS_CONFIG.find(r => r.id === id);
            if (!cfg) return;
            
            const prev = roomState[id];
            roomState[id] = data;

            // Logic Status
            let status = 'ok';
            if (data.temp > cfg.max || data.temp < cfg.min) status = 'alarm';
            else if (data.temp > cfg.max - cfg.warnOffset || data.temp < cfg.min + cfg.warnOffset) status = 'warn';

            const card = document.getElementById(`card-${id}`);
            card.className = `room-card ${status}`;
            
            document.getElementById(`chip-${id}`).className = `status-chip chip-${status === 'alarm' ? 'err' : 'ok'}`;
            document.getElementById(`chip-${id}`).textContent = status.toUpperCase();
            
            const tempEl = document.getElementById(`temp-${id}`);
            tempEl.textContent = data.temp.toFixed(1);
            tempEl.className = `metric-value ${data.temp < 0 ? 'val-cold' : (status === 'alarm' ? 'val-err' : 'val-ok')}`;
            
            document.getElementById(`hum-${id}`).textContent = Math.round(data.hum) + '%';
            
            const doorEl = document.getElementById(`door-${id}`);
            doorEl.textContent = data.door === 'open' ? 'OPEN ⚠️' : 'Closed';
            doorEl.style.color = data.door === 'open' ? 'var(--red)' : 'var(--green)';

            // Comp & Defrost
            if (data.defrost) {
                if (!defrostStart[id]) defrostStart[id] = Date.now();
                const m = Math.floor((Date.now() - defrostStart[id]) / 60000);
                document.getElementById(`defrost-${id}`).className = 'equip-badge defrost-on';
                document.getElementById(`defrost-${id}`).textContent = `❄️ Defrost ${m}m`;
            } else {
                defrostStart[id] = null;
                document.getElementById(`defrost-${id}`).className = 'equip-badge';
                document.getElementById(`defrost-${id}`).textContent = `❄️ Defrost OFF`;
            }

            if (prev && prev.temp !== data.temp && status === 'alarm') {
                addLog(`⚠️ ${cfg.name}: Temp critical ${data.temp}°C`, 'red');
                if (soundEnabled) playAlarmSound();
            }
            
            updateSummary();
            pushChartPoint(id, data.temp);
        }

        // ============================================================
        // MQTT & LOGS
        // ============================================================
        let mqttClient = null;
        function reconnect() {
            if (mqttClient) mqttClient.end(true);
            const broker = document.getElementById('brokerInput').value.trim() || 'broker.hivemq.com';
            
            setConn('connecting');
            mqttClient = mqtt.connect(`wss://${broker}:8884/mqtt`, {
                clientId: 'coldroom-' + Math.random().toString(16).slice(2, 8),
                clean: true
            });

            mqttClient.on('connect', () => {
                setConn('connected');
                addLog('MQTT Connected', 'green');
                ROOMS_CONFIG.forEach(r => mqttClient.subscribe(`coldroom/${r.id}/sensor`));
            });

            mqttClient.on('message', (topic, msg) => {
                try {
                    const d = JSON.parse(msg.toString());
                    const id = d.room || topic.split('/')[1];
                    if (id in roomState) updateCard(id, d);
                } catch(e) { console.error(e); }
            });

            mqttClient.on('error', () => setConn('error'));
        }

        function setConn(s) {
            const m = { connecting: ['#d29922', 'Connecting...'], connected: ['#3fb950', 'Connected'], error: ['#f85149', 'Error'] };
            document.getElementById('connDot').style.cssText = `display:inline-block; width:8px; height:8px; border-radius:50%; background:${m[s][0]}`;
            document.getElementById('connText').textContent = m[s][1];
        }

        function addLog(msg, color) {
            const c = { red: '#f85149', green: '#3fb950', amber: '#d29922' }[color] || '#7d8590';
            const list = document.getElementById('logList');
            if (list.innerHTML.includes('รอข้อมูล')) list.innerHTML = '';
            const t = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span class="log-time">[${t}]</span> <span style="color:${c}">${msg}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 50) list.removeChild(list.lastChild);
        }

        function clearLog() { document.getElementById('logList').innerHTML = '<div style="color:var(--muted); text-align:center;">Log Cleared</div>'; }

        // ============================================================
        // CHART
        // ============================================================
        let chart;
        const chartData = { labels: [], datasets: [] };

        function initChart() {
            const ctx = document.getElementById('tempChart').getContext('2d');
            const datasets = ROOMS_CONFIG.map((r, i) => ({
                label: r.name,
                data: [],
                borderColor: ['#58a6ff', '#f85149', '#3fb950', '#d29922'][i % 4],
                tension: 0.3,
                pointRadius: 0
            }));
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#7d8590', font: { size: 10 } } } },
                    scales: {
                        x: { ticks: { color: '#7d8590', maxTicksLimit: 10 } },
                        y: { ticks: { color: '#7d8590' } }
                    }
                }
            });
        }

        function pushChartPoint(id, temp) {
            if (!chart) return;
            const idx = ROOMS_CONFIG.findIndex(r => r.id === id);
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (chart.data.labels.length === 0 || chart.data.labels[chart.data.labels.length - 1] !== now) {
                chart.data.labels.push(now);
                if (chart.data.labels.length > 30) chart.data.labels.shift();
            }

            chart.data.datasets[idx].data.push(temp);
            if (chart.data.datasets[idx].data.length > 30) chart.data.datasets[idx].data.shift();
            chart.update('quiet');
        }

        // ============================================================
        // UTILS & INIT
        // ============================================================
        function updateSummary() {
            let ok=0, warn=0, alarm=0, off=0;
            ROOMS_CONFIG.forEach(r => {
                const d = roomState[r.id];
                if (!d) off++;
                else if (d.temp > r.max || d.temp < r.min) alarm++;
                else if (d.temp > r.max - r.warnOffset || d.temp < r.min + r.warnOffset) warn++;
                else ok++;
            });
            document.getElementById('sumOk').textContent = ok;
            document.getElementById('sumWarn').textContent = warn;
            document.getElementById('sumAlarm').textContent = alarm;
            document.getElementById('sumOff').textContent = off;
        }

        function playAlarmSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 880; gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔔' : '🔕';
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function saveSettings() {
            const dm = document.getElementById('defrostMaxMin').value;
            localStorage.setItem('defrostMaxMin', dm);
            defrostMaxMs = dm * 60000;
            reconnect();
            closeSettings();
        }

        function exportExcel() {
            const data = Object.keys(roomState).map(id => ({
                Room: id,
                Temp: roomState[id]?.temp || 'N/A',
                Hum: roomState[id]?.hum || 'N/A',
                Time: new Date().toLocaleString()
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Status");
            XLSX.writeFile(wb, "ColdRoom_Report.xlsx");
        }

        setInterval(() => {
            document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('th-TH');
        }, 1000);

        // Start App
        window.onload = () => {
            buildCards();
            initChart();
            reconnect();
        };

    </script>
</body>
</html>
